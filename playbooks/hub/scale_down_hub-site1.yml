- name: Bring down Hub Site 1.
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Scale Hub CR replicas according to role. 
      redhat.openshift.k8s:
        state: present
        api_version: automationhub.ansible.com/v1beta1
        kind: AutomationHub
        name: hub-aws-01
        namespace: aap-24
        merge_type: merge 
        definition:
          spec:
            web:
              replicas: 0
            content:
              replicas: 0
            api: 
              replicas: 0
            redis: 
              replicas: 0
            resource_manager: 
              replicas: 0
            worker: 
              replicas: 0
    
    - name: Ensure redis deployment is scaled down. 
      redhat.openshift.k8s:
        state: present
        api_version: apps/v1
        kind: Deployment
        name: hub-aws-01-redis
        namespace: aap-24
        merge_type: merge 
        definition:
          spec:
            replicas: 0

    - name: Ensure hub worker deployment is scaled down. 
      redhat.openshift.k8s:
        state: present
        api_version: apps/v1
        kind: Deployment
        name: hub-aws-01-worker
        namespace: aap-24
        merge_type: merge 
        definition:
          spec:
            replicas: 0