- name: Bring up Hub Site 1.
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Scale Hub CR replicas according to role. 
      redhat.openshift.k8s:
        state: present
        api_version: automationhub.ansible.com/v1beta1
        kind: AutomationHub
        name: hub-aws-01
        namespace: aap-24
        merge_type: merge 
        definition:
          spec:
            web:
              replicas: 1
            content:
              replicas: 2
            api: 
              replicas: 1
            redis: 
              replicas: 1
            resource_manager: 
              replicas: 1
            worker: 
              replicas: 2

    - name: Ensure redis deployment is scaled up. 
      redhat.openshift.k8s:
        state: present
        api_version: apps/v1
        kind: Deployment
        name: hub-aws-01-redis
        namespace: aap-24
        merge_type: merge 
        definition:
          spec:
            replicas: 1

    - name: Ensure hub worker deployment is scaled up. 
      redhat.openshift.k8s:
        state: present
        api_version: apps/v1
        kind: Deployment
        name: hub-aws-01-worker
        namespace: aap-24
        merge_type: merge 
        definition:
          spec:
            replicas: 2